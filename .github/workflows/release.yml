name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            ffmpeg_name: 'ffmpeg-aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            ffmpeg_name: 'ffmpeg-x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            ffmpeg_name: 'ffmpeg-x86_64-unknown-linux-gnu'
          - platform: windows-latest
            args: ''
            ffmpeg_name: 'ffmpeg-x86_64-pc-windows-msvc.exe'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Download FFmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: app/src-tauri
        run: |
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip"
          unzip -o ffmpeg.zip
          mv ffmpeg ${{ matrix.ffmpeg_name }}
          chmod +x ${{ matrix.ffmpeg_name }}
          rm -f ffmpeg.zip

      - name: Download FFmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: app/src-tauri
        run: |
          curl -L -o ffmpeg.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          tar xf ffmpeg.tar.xz
          mv ffmpeg-*-amd64-static/ffmpeg ffmpeg-x86_64-unknown-linux-gnu
          chmod +x ffmpeg-x86_64-unknown-linux-gnu
          rm -rf ffmpeg.tar.xz ffmpeg-*-amd64-static

      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: app/src-tauri
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          unzip -o ffmpeg.zip
          mv ffmpeg-*-essentials_build/bin/ffmpeg.exe ffmpeg-x86_64-pc-windows-msvc.exe
          rm -rf ffmpeg.zip ffmpeg-*-essentials_build

      - name: Verify FFmpeg exists
        working-directory: app/src-tauri
        shell: bash
        run: ls -la ${{ matrix.ffmpeg_name }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'LocalMP3 ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the installer for your platform.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
